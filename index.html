<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的 App 项目</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="phone-shell">
    <div class="status-bar">
        <span id="clock">12:00</span>
        <div class="status-icons">
            <span id="network-icon">
                <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor">
                    <rect x="0" y="8" width="3" height="4" rx="0.5" opacity="0.3"/>
                    <rect x="5" y="5" width="3" height="7" rx="0.5" opacity="0.3"/>
                    <rect x="10" y="2" width="3" height="10" rx="0.5" opacity="0.3"/>
                    <rect x="15" y="0" width="3" height="12" rx="0.5" opacity="0.3"/>
                </svg>
            </span>
            <span id="battery-container">
                <svg id="battery-icon" width="25" height="12" viewBox="0 0 25 12">
                    <rect x="0" y="0" width="22" height="12" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="1"/>
                    <rect x="22" y="3" width="3" height="6" rx="1" fill="currentColor" opacity="0.5"/>
                    <rect id="battery-level" x="2" y="2" width="18" height="8" rx="1" fill="currentColor"/>
                </svg>
                <span id="battery-percent">--%</span>
            </span>
        </div>
    </div>

    <div id="viewport">
    <section id="page-home" class="page active">
    <div class="profile-card">
        <div class="profile-banner" id="profile-banner" onclick="document.getElementById('banner-upload').click()">
            <div class="upload-hint-banner">更换背景图片</div>
        </div>
        
        <div class="profile-content-wrapper">
            <div class="profile-info">
                <div class="profile-avatar-wrapper" onclick="document.getElementById('avatar-upload').click()">
                    <img src="默认头像.jpg" id="user-avatar">
                    <div class="upload-hint">更换图片</div>
                </div>
                <h2 contenteditable="true" id="user-name">请输入名字</h2>
                <p contenteditable="true" id="user-signature">请输入个性签名</p>
                <span contenteditable="true" id="user-location">📍 请输入地区</span>
            </div>

            <div class="profile-clock-box">
                <div id="big-time">--:--</div>
                <div id="big-date">加载中...</div>
            </div>
        </div>
    </div>

    <div class="app-grid">
        <div class="app-icon" onclick="switchTab('message')">
            <div class="icon-box">💬</div>
            <span>Chat</span>
        </div>
        <div class="app-icon gray-scale" onclick="alert('纪念日功能开发中...')">
            <div class="icon-box">🤍</div>
            <span>Ourtale</span>
        </div>
        <div class="app-icon" onclick="openPage('settings')">
            <div class="icon-box">⚙️</div>
            <span>Settings</span>
        </div>
        <div class="app-icon gray-scale">
            <div class="icon-box">📷</div>
            <span>Photo</span>
        </div>
    </div>
</section>

        <section id="page-message" class="page">
            <div class="header-title">微信</div>
            <div class="list-item" onclick="openChat('张三')">
                <div class="avatar" style="background: #ff9500;"></div>
                <div style="flex:1">
                    <div style="display:flex; justify-content:space-between"><b>张三</b><small style="color:#999">17:45</small></div>
                    <p style="color:#888; font-size:13px; margin-top:4px">今晚出来吃火锅吗？</p>
                </div>
            </div>
        </section>

       <section id="page-settings" class="page">
    <div class="header-title">
        <span style="position:absolute; left:15px; cursor:pointer" onclick="goHome()">〈 返回</span>
        <span>API 配置</span>
    </div>
    <div class="settings-group">
        <div class="settings-item">
            <label>API 地址 (Base URL)</label>
            <input type="text" id="api-url-input" placeholder="例如: https://api.supxh.xin">
        </div>
        <div class="settings-item">
            <label>API 密钥 (API Key)</label>
            <input type="password" id="api-key-input" placeholder="请输入密钥...">
        </div>
        <div class="settings-item">
    <label>模型选择 (Model)</label>
    <div style="display:flex; gap:10px; margin-bottom: 10px;">
        <input type="text" id="api-model-input" placeholder="请选择或输入模型" style="flex:1">
        <button onclick="fetchModels()" style="width: 80px; background: #000; color: #fff; border-radius: 6px; border: none; cursor: pointer;">拉取模型</button>
    </div>
    <div id="model-list-container" style="max-height: 150px; overflow-y: auto; background: #f0f0f0; border-radius: 6px; font-size: 13px; display: none;">
        <div style="padding: 10px; color: #888;">请先填地址和Key后点击拉取</div>
    </div>
</div>
    </div>
    <button class="btn-save" onclick="saveSettings()">保存配置</button>
</section>
    </div>

    <nav id="nav-bar" style="display: none;">
        <div class="nav-item" onclick="switchTab('message')">💬<br>消息</div>
        <div class="nav-item" onclick="goHome()">🏠<br>桌面</div>
   </nav>

    <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
    <input type="file" id="banner-upload" accept="image/*" style="display: none;">

</div> <script src="script.js"></script>

</body>
</html>
