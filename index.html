<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的 App 项目</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="phone-shell">
    <div class="status-bar">
        <span id="clock">12:00</span>
        <div>📶 🔋</div>
    </div>

    <div id="viewport">
        <section id="page-home" class="page active">
            <div class="app-grid">
                <div class="app-icon" onclick="switchTab('message')">
                    <div class="icon-box" style="background: #07c160;">💬</div>
                    <span>微信</span>
                </div>
                <div class="app-icon" onclick="openPage('settings')">
                    <div class="icon-box" style="background: #8e8e93;">⚙️</div>
                    <span>设置</span>
                </div>
            </div>
        </section>

        <section id="page-message" class="page">
            <div class="header-title">微信</div>
            <div class="list-item" onclick="openChat('张三')">
                <div class="avatar" style="background: #ff9500;"></div>
                <div style="flex:1">
                    <div style="display:flex; justify-content:space-between"><b>张三</b><small style="color:#999">17:45</small></div>
                    <p style="color:#888; font-size:13px; margin-top:4px">今晚出来吃火锅吗？</p>
                </div>
            </div>
        </section>

        <section id="page-settings" class="page">
            <div class="header-title">
                <span style="position:absolute; left:15px; cursor:pointer" onclick="goHome()">〈 返回</span>
                <span>设置</span>
            </div>
            <div class="settings-group">
                <div class="settings-item">
                    <label>API 密钥 (API Key)</label>
                    <input type="password" id="api-key-input" placeholder="请输入您的 API Key...">
                </div>
            </div>
            <button class="btn-save" onclick="saveSettings()">保存并返回</button>
        </section>

        <section id="chat-detail" class="page">
            <div class="header-title">
                <span style="position:absolute; left:15px; cursor:pointer" onclick="closeChat()">〈 返回</span>
                <span id="chat-user-name">张三</span>
            </div>
            <div class="chat-messages" id="msg-container"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="输入消息...">
                <div class="btn-send" onclick="sendMessage()">发送</div>
            </div>
        </section>
    </div>

    <nav id="nav-bar" style="display: none;">
        <div class="nav-item" onclick="switchTab('message')">💬<br>消息</div>
        <div class="nav-item" onclick="goHome()">🏠<br>桌面</div>
    </nav>
</div>

<script src="script.js"></script>

</body>
</html>
